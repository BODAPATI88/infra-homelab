name: Build and Push Platform Portal

on:
  push:
    branches:
      - main

jobs:
  docker:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image Tag
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/bodapati88/bvrinfra-platform:${IMAGE_TAG} \
            -f ./apps/platform/Dockerfile \
            ./apps/platform

      - name: Push Docker Image
        run: |
          docker push ghcr.io/bodapati88/bvrinfra-platform:${IMAGE_TAG}
