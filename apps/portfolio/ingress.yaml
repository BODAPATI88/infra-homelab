apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: bvrinfra-portfolio
  namespace: default

  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"

spec:
  ingressClassName: traefik

  tls:
  - hosts:
    - portfolio.bvrinfra.in
    secretName: wildcard-bvrinfra-tls

  rules:
  - host: portfolio.bvrinfra.in

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: bvrinfra-portfolio
            port:
              number: 80
