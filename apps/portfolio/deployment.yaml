apiVersion: apps/v1
kind: Deployment
metadata:
  name: bvrinfra-portfolio
  namespace: default
  labels:
    app: bvrinfra-portfolio
    managed-by: argocd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bvrinfra-portfolio
  template:
    metadata:
      labels:
        app: bvrinfra-portfolio
    spec:
      containers:
        - name: portfolio
          image: ghcr.io/bodapati88/bvrinfra-portfolio:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - bvrinfra-portfolio
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: bvrinfra-portfolio
  namespace: default
  labels:
    app: bvrinfra-portfolio
spec:
  selector:
    app: bvrinfra-portfolio
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
