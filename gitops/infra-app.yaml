apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: infra-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/BODAPATI88/infra-homelab.git
    targetRevision: main
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      selfHeal: true
      prune: false

    syncOptions:
      - ServerSideApply=true
